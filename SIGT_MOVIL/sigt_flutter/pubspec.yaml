name: sigt_flutter
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: "^3.10.0"

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.0.4 
  mime: ^1.0.4

  # --- Localization ---
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # --- Core UI ---
  cupertino_icons: ^1.0.8

  # --- HTTP & API ---
  http: ^1.6.0

  # --- Local Storage ---
  shared_preferences: ^2.2.2

  # --- Charts ---
  fl_chart: ^0.65.0

  # --- Maps ---
  webview_flutter: ^4.4.2

  # --- URL Launcher ---
  url_launcher: ^6.2.2

  # --- Calendar Widget ---
  table_calendar: ^3.0.9

  # --- JSON Serialization ---
  json_annotation: ^4.8.1

  # --- State Management ---
  provider: ^6.1.1
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  open_file: ^3.5.10
  flutter_file_downloader: ^2.1.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
